name: Build executor

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.ts"

permissions:
  contents: write

jobs:
  build:
    name: Build and commit hotwallet.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install

      - run: yarn build

      - name: Commit built executor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotwallet.js
          git diff --staged --quiet || git commit -m "chore: rebuild hotwallet executor"
          git push
